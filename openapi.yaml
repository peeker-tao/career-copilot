  # ============================================================
  # 简历模块
  # ============================================================
  /resumes/upload:
    post:
      tags:
        - 简历管理
      summary: 上传简历
      description: 上传 PDF 或 Word 格式的简历文件，系统将异步解析
      operationId: uploadResume
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: 简历文件，支持 .pdf / .docx，≤ 10MB
                title:
                  type: string
                  description: 简历名称（默认使用文件名）
                  example: 小明_简历_2026
      responses:
        '201':
          description: 上传成功，简历异步解析中
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      code:
                        type: integer
                        example: 201
                      message:
                        type: string
                        example: 上传成功，简历解析中
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                            example: clx...
                          title:
                            type: string
                            example: 小明_简历_2026.pdf
                          fileUrl:
                            type: string
                            format: uri
                            example: https://...
                          status:
                            type: string
                            enum:
                              - parsing
                            example: parsing
        '400':
          description: 参数错误
        '413':
          description: 文件大小超限（> 10MB）

  /resumes:
    get:
      tags:
        - 简历管理
      summary: 获取简历列表
      description: 获取当前用户的所有简历列表
      operationId: listResumes
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
            maximum: 50
          description: 每页条数
      responses:
        '200':
          description: 成功获取简历列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/ResumeSummary'
                          pagination:
                            $ref: '#/components/schemas/PaginationResult'

  /resumes/{id}:
    get:
      tags:
        - 简历管理
      summary: 获取简历详情
      description: 获取单份简历的详细信息，包含 LLM 解析后的结构化数据
      operationId: getResume
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: 简历 ID
          example: clx...
      responses:
        '200':
          description: 成功获取简历详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ResumeDetail'
        '404':
          description: 简历不存在
    put:
      tags:
        - 简历管理
      summary: 编辑简历解析结果
      description: 手动修正 LLM 解析后的简历数据
      operationId: updateResume
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: 简历 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResumeRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ResumeDetail'
        '404':
          description: 简历不存在
    delete:
      tags:
        - 简历管理
      summary: 删除简历
      description: 删除指定简历
      operationId: deleteResume
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: 简历 ID
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      message:
                        type: string
                        example: 删除成功
        '404':
          description: 简历不存在

