services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:15
    container_name: career-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app123456
      POSTGRES_DB: career_copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: career-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
